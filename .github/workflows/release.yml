name: Release

on:
  push:
    branches:
      - "release/v*"
      - "version/*"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    env:
      RELEASE_REPO: ${{ github.repository }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      GGML_NATIVE: "OFF"
      GGML_CPU_ARM_ARCH: "armv8.2-a"
      CMAKE_C_FLAGS: "-U__ARM_FEATURE_MATMUL_INT8"
      CMAKE_CXX_FLAGS: "-U__ARM_FEATURE_MATMUL_INT8"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release tag
        shell: bash
        run: |
          version="$(node -p "JSON.parse(require('node:fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version")"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_tag="${{ github.event.inputs.release_tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF#refs/tags/}"
          else
            release_tag="v${version}"
          fi

          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Release tag must look like v0.0.1. Got: $release_tag" >&2
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/heads/release/* || "$GITHUB_REF" == refs/heads/version/* ]]; then
            branch_release="${GITHUB_REF#refs/heads/release/}"
            branch_release="${branch_release#refs/heads/version/}"
            if [[ ! "$branch_release" == v* ]]; then
              branch_release="v${branch_release}"
            fi

            if [[ "$branch_release" != "$release_tag" ]]; then
              echo "Release branch ($branch_release) must match src-tauri version tag ($release_tag)." >&2
              exit 1
            fi
          fi

          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "Resolved release tag: $release_tag"

      - name: Create release tag if missing
        if: startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/version/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists locally."
          elif git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
            echo "Fetched existing remote tag $RELEASE_TAG."
          else
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$RELEASE_TAG"
            echo "Created and pushed tag $RELEASE_TAG."
          fi

      - name: Validate release secrets
        shell: bash
        run: |
          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY" ]]; then
            echo "Missing required secret: TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi

          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]]; then
            echo "Missing required secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build changelog
        run: pnpm changelog:build

      - name: Add changelog to updater manifest notes
        shell: bash
        run: |
          {
            echo "RELEASE_NOTES<<EOF"
            cat release/release-notes.md
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build desktop app
        run: pnpm desktop:build

      - name: Prepare updater assets
        run: pnpm release:prepare

      - name: Read release metadata
        id: release_metadata
        run: |
          node -e 'const fs = require("node:fs"); const metadata = JSON.parse(fs.readFileSync("release/release-metadata.json", "utf8")); const output = process.env.GITHUB_OUTPUT; const installerPaths = (metadata.installerAssets ?? []).map((asset) => asset.path).join("\n"); fs.appendFileSync(output, `archive_path=${metadata.archivePath}\nmanifest_path=${metadata.manifestPath}\nasset_name=${metadata.assetName}\nmanifest_name=${metadata.manifestName}\ndownload_url=${metadata.downloadUrl}\nrelease_tag=${metadata.releaseTag}\ninstaller_paths<<EOF\n${installerPaths}\nEOF\n`);'

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release/release-notes.md
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release/release-notes.md --target "$GITHUB_SHA"
          fi

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          assets=(
            "${{ steps.release_metadata.outputs.archive_path }}"
            "${{ steps.release_metadata.outputs.manifest_path }}"
          )

          while IFS= read -r installer_path; do
            if [[ -n "$installer_path" ]]; then
              assets+=("$installer_path")
            fi
          done <<< "${{ steps.release_metadata.outputs.installer_paths }}"

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
