name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
      RELEASE_REPO: ${{ github.repository }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release secrets
        shell: bash
        run: |
          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY" ]]; then
            echo "Missing required secret: TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi

          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]]; then
            echo "Missing required secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm desktop:build

      - name: Prepare updater assets
        run: pnpm release:prepare

      - name: Read release metadata
        id: release_metadata
        run: |
          node -e 'const fs = require("node:fs"); const metadata = JSON.parse(fs.readFileSync("release/release-metadata.json", "utf8")); const output = process.env.GITHUB_OUTPUT; fs.appendFileSync(output, `archive_path=${metadata.archivePath}\nmanifest_path=${metadata.manifestPath}\nasset_name=${metadata.assetName}\nmanifest_name=${metadata.manifestName}\ndownload_url=${metadata.downloadUrl}\nrelease_tag=${metadata.releaseTag}\n`);'

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "Automated release for $RELEASE_TAG" --target "$GITHUB_SHA"
          fi

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "${{ steps.release_metadata.outputs.archive_path }}" \
            "${{ steps.release_metadata.outputs.manifest_path }}" \
            --clobber
